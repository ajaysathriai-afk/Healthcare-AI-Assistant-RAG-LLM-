name: CI - Fast Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # CASE 1 — requirements.txt in repo root
          if [ -f requirements.txt ]; then
            echo "Found ROOT requirements.txt"
            pip install -r requirements.txt

          # CASE 2 — requirements inside the folder healthcare-ai-assistant/
          elif [ -f healthcare-ai-assistant/requirements.txt ]; then
            echo "Found SUBFOLDER requirements.txt"
            pip install -r healthcare-ai-assistant/requirements.txt

          # CASE 3 — no requirements found anywhere
          else
            echo "No requirements found — installing minimal pytest"
            pip install pytest
          fi

          # ensure pytest is available
          pip install pytest

      - name: Run fast tests
        run: |
          pytest -q -m "not slow"
