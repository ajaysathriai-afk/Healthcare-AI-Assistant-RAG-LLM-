name: CI - Fast Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Look for requirements.txt at repo root or inside healthcare-ai-assistant/
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f healthcare-ai-assistant/requirements.txt ]; then
            pip install -r healthcare-ai-assistant/requirements.txt
          else
            echo "No requirements.txt found; installing minimal test deps"
            pip install pytest
          fi
          # ensure pytest is available
          pip install pytest

      - name: Run fast tests
        run: |
          pytest -q -m "not slow"
